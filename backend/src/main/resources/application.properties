spring.application.name=backend
server.port=8080

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Admin seeding
admin.email=${ADMIN_EMAIL}
admin.temp-password=${ADMIN_TEMP_PASSWORD}

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Supabase Storage
supabase.url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_KEY}
supabase.storage.bucket=${SUPABASE_BUCKET}

# CORS
app.cors.origin=${CORS_ORIGIN}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.google-register.provider=google
spring.security.oauth2.client.registration.google-register.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google-register.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google-register.scope=email,profile
spring.security.oauth2.client.registration.google-register.redirect-uri=${GOOGLE_REDIRECT_URI}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true