spring.application.name=backend
server.port=8080

# ── Database ──
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Admin seeding ──
admin.email=admin@eventwear.com
admin.temp-password=Admin@123

# ── File upload limits ──
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Supabase Storage ──
supabase.url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.storage.bucket=${SUPABASE_BUCKET}

# ── CORS ──
app.cors.origin=${APP_CORS_ORIGIN}